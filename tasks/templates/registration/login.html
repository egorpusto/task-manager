{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title mb-4">
                    <i class="fas fa-sign-in-alt me-2"></i>Log In
                </h2>
                {% if form.errors %}
                <div class="alert alert-danger">Username or password didn't match. Please try again.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Log In</button>
                </form>
                <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
